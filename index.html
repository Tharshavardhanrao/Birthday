<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Happy Birthday Brother 🎉</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&family=Dancing+Script:wght@600&family=Great+Vibes&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        margin: 0;
        padding: 0;
        background: #111;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        transition: 1s;
        overflow: hidden;
      }

      .decorations {
        position: absolute;
        top: 0;
        width: 100%;
        text-align: center;
        font-size: 40px;
        padding: 15px 0;
        animation: glow 1.5s infinite alternate;
      }

      @keyframes glow {
        from {
          opacity: 0.6;
        }
        to {
          opacity: 1;
        }
      }

      .card {
        background: white;
        padding: 45px;
        border-radius: 20px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        text-align: center;
        display: none;
        animation: fadeIn 1.5s ease forwards;
        max-width: 500px;
      }

      h1 {
        font-family: "Pacifico", cursive;
        font-size: 44px;
        color: #ff4e50;
        margin-bottom: 10px;
      }

      h2 {
        font-family: "Dancing Script", cursive;
        font-size: 28px;
        color: #444;
        margin-bottom: 20px;
      }

      p {
        font-family: "Great Vibes", cursive;
        font-size: 28px;
        line-height: 1.8;
        background: linear-gradient(45deg, #ff4e50, #ff9a9e);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: 1px;
      }

      button {
        font-family: "Dancing Script", cursive;
        font-size: 22px;
        padding: 15px 30px;
        border: none;
        border-radius: 30px;
        background: #ff4e50;
        color: white;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        background: #ff1c1c;
        transform: scale(1.05);
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: scale(0.8);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
    </style>
  </head>

  <body>
    <div class="decorations">🎈 🎉 🎂 🎁 🎈 🎉 🎂 🎁</div>

    <button onclick="turnOnLights()">💡 Turn On The Lights</button>

    <div class="card" id="birthdayCard">
      <h1>🎉 Happy Birthday 🎉</h1>
      <h2>Annaya ❤️</h2>
      <p>
        May your life shine brighter than the candles on your cake. May success,
        happiness and endless joy follow you forever.
      </p>
    </div>

    <audio id="birthdaySong" preload="auto">
      <source src="happy-birthday.mp3" type="audio/mpeg" />
    </audio>

    <script>
      function turnOnLights() {
        document.body.style.background =
          "linear-gradient(135deg, #ff9a9e, #fad0c4)";
        document.getElementById("birthdayCard").style.display = "block";
        document.querySelector("button").style.display = "none";

        var song = document.getElementById("birthdaySong");
        song.play().catch(function (error) {
          console.log("Autoplay blocked:", error);
        });
      }
    </script>
  </body>
</html>
